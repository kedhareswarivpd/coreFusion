server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 15M;

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' http://backend:8000; media-src 'self'; frame-src 'none'; object-src 'none'" always;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml video/mp4;

    # ---- API + uploaded assets: proxy straight through to the FastAPI backend ----
    # "backend" resolves via Docker Compose's internal DNS (the service name
    # defined in the root docker-compose.yml).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    # ---- Hero video ----
    location ~* \.mp4$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;
    }

    # ---- Single-page app: let React Router handle unknown paths ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets Vite emits under /assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
